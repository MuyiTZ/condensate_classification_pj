
# ──────────────────────────────────────────────────────────────────────────────
# 1. Paths
# ──────────────────────────────────────────────────────────────────────────────
[path]
csv_path = 'D:\Tianzi\20240426_HAP1_NONO\HAP1_NONO_CTRL\STREAM\ImagesNoMetadata\d1'
mask_path            = 'D:\Tianzi\20240426_HAP1_NONO\HAP1_NONO_CTRL\MASK'         # Folder of per-frame PNG masks (dimensions must match video)
output_folder_name   = 'SF_10ms_condensate_may22_'     # Name for the pipeline’s output directory
one_csv_per_cell     = true # if true : one csv spots file per cell per video, if false: a single csv spots file per video

# ──────────────────────────────────────────────────────────────────────────────
# 2. Toggle Flags
# ──────────────────────────────────────────────────────────────────────────────
[toggle]
use_gap_fixed           = true   # Interpolate short detection gaps before reclassification
filter_by_binding_prop  = true   # Drop tracks whose bound+constrained fraction is out of range
run_visualizer          = false   # Generate colored overlay videos of track behaviors
run_MSD_calculations    = true   # Compute and plot Mean Squared Displacement (MSD) curves
run_fixed_particle      = false   # Execute experimental ComDet-based rebinding analysis
bacteria_analysis       = false   # Aggressive overlap filtering for single-molecule (bacterial) data
two_exponential_analysis= false
run_track_classify = true   # true to run track reconstruction analysis
run_multi_breakdown = true  #true to run reconstruction analysis 
run_single_breakdown = true
run_condensate_filtering = true   # true to run condensate filteration, single_behaviours selected if const.diff>=0.66/66%, multi_behaviours selected if const.diff>=0.3/30%
run_condensate_evaluation =  true #

# ──────────────────────────────────────────────────────────────────────────────
# 3. Track-Sorting
# ──────────────────────────────────────────────────────────────────────────────
[track-sorting]
allowed_gap_max           = 2    # Max consecutive missing frames before splitting a track
allowed_track_length_min  = 4    # Discard tracks shorter than this (frames)
allowed_track_length_max  = 4000  # Discard tracks longer than this (frames)
allowed_overlap           = 100    # Overlap frames threshold for collision resolution
concurrent_max            = 10 # Max consecutive frames with >1 simultaneous spots

# ──────────────────────────────────────────────────────────────────────────────
# 4. Bound-Classification
# ──────────────────────────────────────────────────────────────────────────────
[bound-classification]
distance_threshold         = 2.0   # px: relaxed binding step threshold over ±4-frame window2.0
distance_threshold_strict  = 0.72   # px: strict binding threshold (low false-pos) for high-framerate0.72

# ──────────────────────────────────────────────────────────────────────────────
# 5. Gaps-&-Fixes
# ──────────────────────────────────────────────────────────────────────────────
[gaps-and-fixes]
min_time_strict            = 4      # frames: min length for strict-binding; shorter ⇒ constrained
min_time_constrained       = 3      # frames: min for constrained diffusion; shorter ⇒ free
min_time_diffusion         = 3      # frames: min for free diffusion; shorter ⇒ context reclassification
max_bound_gapFill          = 4      # frames: gap allowance to merge into strict-binding
min_prop_binding           = 0.00   # fraction: min track-level bound+constrained to keep
max_prop_binding           = 1.01   # fraction: max track-level bound+constrained to keep

# ──────────────────────────────────────────────────────────────────────────────
# 6. Rebind-Analysis
# ──────────────────────────────────────────────────────────────────────────────
[rebind-analysis]
rebind_distance_same          = 1.0     # px: same-site rebinding distance threshold
rebind_distance_diff          = 4.0     # px: nearby-site rebinding distance threshold
min_time_bound_strict         = 4       # frames: min strict-binding for rebinding logs
min_time_rebinding_strict     = 4
max_time_rebinding            = 100     # Reduce the limit for unsuccessful rebinding


# ──────────────────────────────────────────────────────────────────────────────
# 7. MSD-Analysis
# ──────────────────────────────────────────────────────────────────────────────
[MSD-analysis]
time_interval_ms     = 10.0    # ms: frame interval (must match acquisition)
pixel_size_um        = 0.094   # µm: physical pixel size for D calculations
use_brownian_only    = true    # force anomalous exponent α = 1 (pure Brownian fit)

# ──────────────────────────────────────────────────────────────────────────────
# 8. Visualizer
# ──────────────────────────────────────────────────────────────────────────────
[visualizer]
tail_effect_enabled  = true    # draw motion-blur “tails” for moving spots
spot_diameter        = 4       # px diameter of each spot in the overlay

# ──────────────────────────────────────────────────────────────────────────────
# 9. Rebind-Fixed-Particle
# ──────────────────────────────────────────────────────────────────────────────
[rebind-fixed-particle]
allowed_spot_overlap = 0.10    # max fractional area overlap for ComDet spots

# ──────────────────────────────────────────────────────────────────────────────
# 10. Rebind-Fixed-Particle
# ──────────────────────────────────────────────────────────────────────────────
[two-exponential-analysis]
Test_Bound      = true
Test_Diffusion  = true

# ──────────────────────────────────────────────────────────────────────────────
# 11. Track_reconstruction
# ──────────────────────────────────────────────────────────────────────────────
[track_classification]
run_track_classify      = true   # 实际使用此节内的参数，上面的 toggle 控制是否运行 
min_len = 10            # 最小轨迹长度（帧）
min_cont = 3            # 有效状态的最小连续帧数
input_file = "gaps-and-fixes_decisions.csv"   # 可指定使用哪个中间文件，默认用这个
output_dir = ""         # 输出目录，留空表示与输入文件同目录
use_smoothing = true   # 是否对行为序列进行中值滤波（平滑）

# ──────────────────────────────────────────────────────────────────────────────
# 12. multi_behaviour_track_breakdown
# ──────────────────────────────────────────────────────────────────────────────
[multi_breakdown]
input_file = "multi-behaviour-track.csv"
min_bound_segment_frames = 4

# ──────────────────────────────────────────────────────────────────────────────
# 13. Condensate_evaluation
# ──────────────────────────────────────────────────────────────────────────────
[condensate_evaluation]
frame_interval = 0.01          # frame interval（s）
pixel_size_um = 0.094         # pixel size（micron）
window_size = 11              # sliding window size（frame）Note: this is the initial guess, not the actual window size.
persistence_windows = 3       # min presistance window (frame)
localization_sigma_um = 0.01  # localization error in micron, for simulation, need to change later
n_sim = 100                   # number of track length simulation 
score_quantile = 0.90         # high score percentile cut-off（ from null distribution）
# ──────────────────────────────────────────────────────────────────────────────
# 14. single_behaviours_breakdown
# ──────────────────────────────────────────────────────────────────────────────
input_file = "single-behaviour-track.csv"
min_cont = 3
duration_violin = true
frame_interval_s = 0.01